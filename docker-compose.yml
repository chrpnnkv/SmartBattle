version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartbattle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartbattle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartbattle"]
      interval: 10s
      timeout: 5s
      retries: 10

  quiz-core:
    build:
      context: ./quiz-core
      dockerfile: Dockerfile
    container_name: smartbattle-quiz-core
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "host=postgres user=postgres password=postgres dbname=smartbattle port=5432 sslmode=disable"
      JWT_SECRET: "supersecret"
      X_INTERNAL_SECRET: "internal_secret_key"
      REALTIME_URL: "http://realtime:8080"
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: smartbattle-realtime
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      JWT_SECRET: "supersecret"
      BACKEND_CORE_URL: "http://quiz-core:8080"
      BACKEND_CORE_INTERNAL_SECRET: "internal_secret_key"
      MAX_PARTICIPANTS: "100"
      RATE_LIMIT_MESSAGES: "10"
      RATE_LIMIT_PERIOD: "1s"
      DEFAULT_QUESTION_TIME_SEC: "30"
      LOG_LEVEL: "info"
      ROOM_CODE_LENGTH: "6"
    ports:
      - "8081:8080"
    depends_on:
      quiz-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"
        VITE_WS_URL: "ws://localhost:8081"
        VITE_USE_MOCK: "false"
    container_name: smartbattle-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      quiz-core:
        condition: service_healthy
      realtime:
        condition: service_healthy

volumes:
  postgres_data:
