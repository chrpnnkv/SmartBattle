version: "3.9"

services:
  # ── SmartBattle Real-Time Backend ─────────────────────────
  realtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartbattle-realtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      BACKEND_CORE_URL: ${BACKEND_CORE_URL:-http://backend-core:8081}
      BACKEND_CORE_INTERNAL_SECRET: ${BACKEND_CORE_INTERNAL_SECRET:-}
      MAX_PARTICIPANTS: ${MAX_PARTICIPANTS:-100}
      RATE_LIMIT_MESSAGES: "10"
      RATE_LIMIT_PERIOD: "1s"
      DEFAULT_QUESTION_TIME_SEC: "30"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WS_PONG_WAIT: "60s"
      WS_WRITE_WAIT: "10s"
    depends_on:
      - backend-core
    networks:
      - smartbattle-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Заглушка backend-core (для локальной разработки) ──────
  backend-core:
    image: mockserver/mockserver:latest
    container_name: smartbattle-core-mock
    ports:
      - "8081:1080"
    networks:
      - smartbattle-net
    profiles:
      - dev

networks:
  smartbattle-net:
    driver: bridge
